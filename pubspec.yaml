name: blood_bank_app
description: "A new Flutter project for VivaLink Blood Bank."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.2
  firebase_database: ^11.0.0
  # firebase_storage: أُزيل واستُبدل بـ Supabase

  # Supabase Storage
  supabase_flutter: ^2.8.4

  # أخرى
  image_picker: ^1.0.7
  device_preview: ^1.1.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8

  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/welcomepage.png