name: blood_bank_app
description: "A new Flutter project for VivaLink Blood Bank."

# لمنع النشر غير المقصود إلى pub.dev
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0' # تم تعديل النطاق ليكون أكثر مرونة وتوافقاً

dependencies:
  flutter:
    sdk: flutter

  # المكتبات الأساسية للفايربيس (إصدارات مستقرة)
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.2

  # مكتبات التصميم والمعاينة والخطوط
  device_preview: ^1.1.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8

  # مكتبة اللغات والترجمة (ضرورية لدعم العربية في الأندرويد والآيفون)
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # تحديث لإصدار أكثر استقراراً

flutter:
  # تفعيل استخدام Material Design
  uses-material-design: true

  # تعريف الصور (Assets)
  assets:
    - assets/welcomepage.png
